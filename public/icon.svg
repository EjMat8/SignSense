<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 212 222" width="212" height="222" role="img" aria-label="Cute green smiley icon">
  <defs>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-color="#2f7d05" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Character -->
  <g filter="url(#softShadow)">
    <!-- Outer body -->
    <circle cx="106" cy="111" r="74" fill="#79d60c" stroke="#4ea500" stroke-width="5"/>

    <!-- Inner highlight/body -->
    <circle cx="111" cy="113" r="47" fill="#98ef28" opacity="0.9"/>

    <!-- Eyes -->
    <ellipse cx="85" cy="89" rx="18" ry="6" fill="#ffffff" opacity="0.95"/>
    <ellipse cx="131" cy="89" rx="18" ry="6" fill="#ffffff" opacity="0.95"/>
    <circle cx="97" cy="89" r="7" fill="#17174d"/>
    <circle cx="143" cy="89" r="7" fill="#17174d"/>

    <!-- Cheeks -->
    <circle cx="73" cy="113" r="10" fill="#efe0a2" opacity="0.55"/>
    <circle cx="159" cy="113" r="10" fill="#efe0a2" opacity="0.55"/>

    <!-- Smile -->
    <path d="M82 124 C92 138, 120 138, 130 124" fill="none" stroke="#17174d" stroke-width="5.5" stroke-linecap="round"/>
  </g>
</svg>
